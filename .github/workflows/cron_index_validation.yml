name: Periodic RAG Index Alignment and Retrieval Validation

on:
  schedule:
    # Run every Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  validate-index-alignment:
    name: Check Index Alignment & Retrieval
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Verify Index Schema Compliance
        run: python scripts/validate_rag.py

      - name: Verify Index Alignment with Source Files
        run: python scripts/validate_alignment.py

      - name: Verify Retrieval Accuracy Metrics
        run: python scripts/validate_retrieval.py
